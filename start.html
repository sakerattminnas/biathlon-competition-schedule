<!DOCTYPE html>
<html>

<head>
    <title>Biathlon calendar</title>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1">
    <style>
        /* Style the button that is used to open and close the collapsible content */
        .collapsible {
            cursor: pointer;
            padding: 1rem;
            width: 100%;
            border: none;
            text-align: left;
            font-size: large;
            font-family: monospace;
        }

        .inner {
            padding: 0.5em;
        }

        /* Add a background color to the button if it is clicked on (add the .active class with JS), and when you move the mouse over it (hover) */
        .active,
        .collapsible:hover {
            background-color: #ccc;
        }

        /* Style the collapsible content. Note: hidden by default */
        .content {
            padding: 0 2em;
            display: none;
            overflow: hidden;
            background-color: #f1f1f1;
        }

        .place {
            font-weight: bold;
        }

        main {
            max-width: 35rem;
            margin: auto;
            font-family: monospace;
        }

        td {
            padding: 0.5rem;
        }

        .swede {
            text-decoration: underline blue double;
        }
    </style>
    <script type="application/json" src="json/startlists.json"></script>
    <script>
        function readTextFile(file, callback) {
            var rawFile = new XMLHttpRequest();
            rawFile.overrideMimeType("application/json");
            rawFile.open("GET", file, true);
            rawFile.onreadystatechange = function () {
                if (rawFile.readyState === 4 && rawFile.status == "200") {
                    callback(rawFile.responseText);
                }
            }
            rawFile.send(null);
        }

        function createStartlistTable(_data) {
            table = document.createElement('table');
            let data = _data['StartList'];

            if (_data['Relay']) {
                return createStartlistTableRelay(table, data);
            } else {
                for (place in data) {
                    tr = document.createElement('tr');

                    tdPlace = document.createElement('td');
                    tdNation = document.createElement('td');
                    tdFName = document.createElement('td');
                    tdGName = document.createElement('td');

                    tdNation.innerHTML = data[place]['Flag'] + ' ' + data[place]['Nat'];
                    tdPlace.innerHTML = place;

                    tdPlace.className = 'place';

                    if (data[place]['Nat'] == 'SWE') {
                        tdFName.innerHTML = '<span class="swede">' + data[place]['FamilyName'] + '</span>';
                    } else {
                        tdFName.innerHTML = data[place]['FamilyName'];
                   }
                    tdGName.innerHTML = data[place]['GivenName'];

                    tr.appendChild(tdPlace);
                    tr.appendChild(tdFName);
                    tr.appendChild(tdGName);
                    tr.appendChild(tdNation);
                    table.appendChild(tr);
                }
                return table;
            }
        }

        function createStartlistTableRelay(_table, data) {
            for (place in data) {
                let contentTable = document.createElement('table');

                _button = document.createElement('button');
                _content = document.createElement('div');

                _button.className = 'collapsible inner';
                _content.className = 'content';

                _tr = document.createElement('tr');
                _tdPlace = document.createElement('td');
                _tdNation = document.createElement('td');

                _tdNation.innerHTML = data[place]['Flag'] + ' ' + data[place]['Nat'];
                _tdPlace.innerHTML = place;

                _tdPlace.className = 'place';

                _tr.appendChild(_tdPlace);
                _tr.appendChild(_tdNation);

                _button.appendChild(_tr);

                for (leg in data[place]) {
                    if (leg == 'Nat' || leg == 'Flag') {continue;}
                    let leg_tr = document.createElement('tr');

                    leg_tdPlace = document.createElement('td');
                    leg_tdFName = document.createElement('td');
                    leg_tdGName = document.createElement('td');

                    leg_tdPlace.innerHTML = leg;
                    leg_tdPlace.className = 'place';

                    leg_tdFName.innerHTML = data[place][leg]['FamilyName'];
                    leg_tdGName.innerHTML = data[place][leg]['GivenName'];

                    leg_tr.appendChild(leg_tdPlace);
                    leg_tr.appendChild(leg_tdFName);
                    leg_tr.appendChild(leg_tdGName);

                    contentTable.appendChild(leg_tr);
                }

                _content.appendChild(contentTable);

                _table.appendChild(_button);
                _table.appendChild(_content);
            }
            return _table;
        }

        readTextFile("json/startlists.json", function (text) {
            var data = JSON.parse(text);

            main = document.getElementById('main');

            for (date in data) {
                fancyDate = date.replace('; ', ' &#x2013; ');

                let status = data[date]['Status'];
                console.log(status + ' ' + date);

                button = document.createElement('button');
                content = document.createElement('div');

                button.className = 'collapsible';
                content.className = 'content';

                button.innerHTML = fancyDate;

                content.appendChild(createStartlistTable(data[date]));
                main.prepend(content);
                main.prepend(button);
            }

            header = document.createElement('h1');
            header.innerHTML = 'Startlistor';
            main.prepend(header);

            var coll = document.getElementsByClassName("collapsible");
            var i;

            for (i = 0; i < coll.length; i++) {
                coll[i].addEventListener("click", function () {
                    this.classList.toggle("active");
                    var content = this.nextElementSibling;
                    if (content.style.display === "block") {
                        content.style.display = "none";
                    } else {
                        content.style.display = "block";
                    }
                });
            }
        });
    </script>
</head>

<body>
<main id="main"></main>
</body>

</html>
